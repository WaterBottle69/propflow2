<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connecting — PropFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #0b0f0e; color: #e8ede9;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 2rem;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%; max-width: 400px; text-align: center;
  }
  .logo {
    font-size: 1.1rem; color: #9aab9f; margin-bottom: 2.5rem;
    letter-spacing: -.01em;
  }
  .logo em { font-style: normal; color: #4ade80; }
  .spinner {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid #2a3530; border-top-color: #4ade80;
    animation: spin .7s linear infinite;
    margin: 0 auto 1.5rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .title {
    font-size: 1rem; font-weight: 500; color: #e8ede9;
    margin-bottom: .5rem;
  }
  .subtitle { font-size: .82rem; color: #5c6e63; line-height: 1.6; }
  .code {
    font-family: 'DM Mono', monospace; font-size: .72rem;
    color: #5c6e63; margin-top: 1.5rem;
  }
  .success { color: #4ade80; }
  .error-msg { color: #f87171; margin-top: 1rem; font-size: .82rem; line-height: 1.6; }
  .btn {
    display: inline-block; margin-top: 1.5rem;
    font-size: .82rem; font-weight: 600; color: #0b1a10;
    background: #4ade80; padding: .7rem 1.6rem;
    border-radius: .5rem; cursor: pointer; text-decoration: none;
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="logo">PropFlow<em>.</em></div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Connecting your account…</div>
  <div class="subtitle" id="subtitle">Exchanging authorization token. This only takes a moment.</div>
  <div class="code" id="code-display"></div>
</div>

<script src="../config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../js/supabase-client.js"></script>
<script>
(async function () {
  const params   = new URLSearchParams(window.location.search);
  const code     = params.get('code');
  const state    = params.get('state');
  const errorP   = params.get('error');
  const errorDesc= params.get('error_description');

  const titleEl    = document.getElementById('title');
  const subtitleEl = document.getElementById('subtitle');
  const spinnerEl  = document.getElementById('spinner');
  const codeEl     = document.getElementById('code-display');

  // ── OAuth provider returned an error ────────────────────────
  if (errorP) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = 'Authorization failed';
    subtitleEl.innerHTML = `<span class="error-msg">${errorDesc || errorP}</span>`;
    codeEl.innerHTML = '<a href="../dashboard/integrations.html" class="btn">Back to integrations</a>';

    notifyOpener({ type: 'oauth_error', error: errorP, errorDesc });
    return;
  }

  // ── No code in URL ───────────────────────────────────────────
  if (!code || !state) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = 'Invalid callback';
    subtitleEl.innerHTML = '<span class="error-msg">Missing authorization code or state parameter.</span>';
    codeEl.innerHTML = '<a href="../dashboard/integrations.html" class="btn">Back to integrations</a>';
    return;
  }

  // Recover the platform from state (format: "platform_randomhex")
  const platform = state.split('_')[0];

  codeEl.textContent = 'platform: ' + platform;

  // ── Exchange code for token via Supabase Edge Function ───────
  try {
    const sb = window.supabaseClient;

    if (sb) {
      const { data, error } = await sb.functions.invoke('propflow-ai', {
        body: {
          action:        'oauth_exchange',
          platform,
          code,
          state,
          codeVerifier:  sessionStorage.getItem('oauth_verifier_' + state) || null,
          redirectUri:   window.PROPFLOW_CONFIG?.app?.oauthCallbackUrl,
        },
      });

      if (error) throw new Error(error.message);

      // Store connected state for the opener/integrations page
      notifyOpener({ type: 'oauth_success', platform, data });
    } else {
      // No Supabase — just pass the code back so the integrations page can handle it
      notifyOpener({ type: 'oauth_success', platform, code, state });
    }

    // Clean up verifier
    sessionStorage.removeItem('oauth_verifier_' + state);

    spinnerEl.style.display = 'none';
    titleEl.innerHTML = '<span class="success">Connected!</span>';
    subtitleEl.textContent = 'Your account has been linked. You can close this window.';
    codeEl.innerHTML = '<a href="../dashboard/integrations.html" class="btn">Back to integrations</a>';

  } catch (err) {
    spinnerEl.style.display = 'none';
    titleEl.textContent = 'Connection failed';
    subtitleEl.innerHTML = `<span class="error-msg">${err.message || 'Unknown error during token exchange.'}</span>`;
    codeEl.innerHTML = '<a href="../dashboard/integrations.html" class="btn">Back to integrations</a>';

    notifyOpener({ type: 'oauth_error', platform, error: err.message });
  }

  // Auto-close popup after short delay if opened as popup
  if (window.opener) {
    setTimeout(() => window.close(), 2200);
  }
})();

function notifyOpener(payload) {
  try {
    if (window.opener && !window.opener.closed) {
      window.opener.postMessage(payload, window.location.origin);
    }
  } catch (_) { /* cross-origin safety */ }
}
</script>
</body>
</html>
