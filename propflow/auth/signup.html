<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Create Account — PropFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<div class="auth-page">
  <div style="width:100%; max-width:460px;">

    <!-- Logo -->
    <div style="text-align:center; margin-bottom:28px;">
      <a href="../index.html" class="auth-logo" style="display:inline-block; text-decoration:none;">PropFlow<span class="dot">.</span></a>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <h2>Create your account</h2>
        <p>Join 12,000+ agents already on PropFlow. 14 days free, no credit card required.</p>
      </div>
      <div class="auth-body">

        <!-- Error banner -->
        <div id="error-banner" style="display:none; padding:11px 14px; background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); border-radius:var(--radius-sm); font-size:13px; color:var(--red); margin-bottom:16px;"></div>

        <form id="signup-form" novalidate>
          <div class="form-row">
            <div class="form-group">
              <label for="first-name">First name</label>
              <input type="text" id="first-name" placeholder="Jordan" autocomplete="given-name" required/>
              <div class="form-error" id="err-first-name">Required</div>
            </div>
            <div class="form-group">
              <label for="last-name">Last name</label>
              <input type="text" id="last-name" placeholder="Mitchell" autocomplete="family-name" required/>
              <div class="form-error" id="err-last-name">Required</div>
            </div>
          </div>

          <div class="form-group">
            <label for="email">Work email</label>
            <input type="email" id="email" placeholder="you@brokerage.com" autocomplete="email" required/>
            <div class="form-error" id="err-email">Enter a valid email</div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-icon-wrap">
              <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" required/>
              <button type="button" id="toggle-pw" class="input-icon" style="cursor:pointer; pointer-events:all; background:none; border:none; right:12px; left:auto; color:var(--text3); font-size:14px;" onclick="togglePw()">👁</button>
            </div>
            <div class="form-error" id="err-password">Minimum 8 characters</div>
          </div>

          <div class="form-group">
            <label for="role">Your role</label>
            <select id="role">
              <option value="agent">Real Estate Agent</option>
              <option value="team_leader">Team Leader / Broker</option>
            </select>
          </div>

          <div class="form-group">
            <label for="brokerage">Brokerage (optional)</label>
            <input type="text" id="brokerage" placeholder="Century 21, RE/MAX, etc."/>
          </div>

          <!-- Terms -->
          <div style="display:flex; align-items:flex-start; gap:10px; margin-bottom:18px;">
            <input type="checkbox" id="terms" style="width:auto; margin-top:3px; flex-shrink:0; accent-color:var(--accent);" required/>
            <label for="terms" style="font-size:13px; color:var(--text2); cursor:pointer;">
              I agree to the <a href="#" style="color:var(--accent);">Terms of Service</a> and <a href="#" style="color:var(--accent);">Privacy Policy</a>
            </label>
          </div>
          <div class="form-error" id="err-terms">You must agree to continue</div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
            Create account →
          </button>
        </form>
      </div>
      <div class="auth-footer">
        Already have an account? <a href="login.html">Sign in</a>
      </div>
    </div>

    <p style="text-align:center; font-size:12px; color:var(--text3); margin-top:20px;">
      🔒 Your data is encrypted. We never share your information.
    </p>
  </div>
</div>

<div id="toast-container"></div>

<!-- Supabase JS v2 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/app.js"></script>
<script>
function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

document.getElementById('signup-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  // Clear errors
  document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));
  document.getElementById('error-banner').style.display = 'none';

  const first  = document.getElementById('first-name').value.trim();
  const last   = document.getElementById('last-name').value.trim();
  const email  = document.getElementById('email').value.trim();
  const pw     = document.getElementById('password').value;
  const role   = document.getElementById('role').value;
  const broker = document.getElementById('brokerage').value.trim();
  const terms  = document.getElementById('terms').checked;
  let ok = true;

  if (!first)  { document.getElementById('err-first-name').classList.add('visible'); ok = false; }
  if (!last)   { document.getElementById('err-last-name').classList.add('visible'); ok = false; }
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-email').classList.add('visible'); ok = false; }
  if (pw.length < 8) { document.getElementById('err-password').classList.add('visible'); ok = false; }
  if (!terms)  { document.getElementById('err-terms').classList.add('visible'); ok = false; }
  if (!ok) return;

  const btn = document.getElementById('submit-btn');
  setLoading(btn, true);

  const sb = window.supabaseClient;
  if (!sb) {
    // Demo mode — bypass auth
    localStorage.setItem('propflow_demo_user', JSON.stringify({ name: first + ' ' + last, email, role }));
    window.location.href = '../auth/verify.html?email=' + encodeURIComponent(email) + '&demo=1';
    return;
  }

  const { data, error } = await sb.auth.signUp({
    email,
    password: pw,
    options: {
      emailRedirectTo: window.PROPFLOW_CONFIG.app.authRedirectUrl,
      data: {
        full_name: first + ' ' + last,
        role,
        brokerage: broker,
      },
    },
  });

  setLoading(btn, false, 'Create account →');

  if (error) {
    document.getElementById('error-banner').textContent = error.message;
    document.getElementById('error-banner').style.display = 'block';
    return;
  }

  // Insert profile row
  if (data.user) {
    await sb.from('profiles').upsert({
      id: data.user.id,
      full_name: first + ' ' + last,
      email,
      role,
      brokerage: broker,
    });
  }

  window.location.href = 'verify.html?email=' + encodeURIComponent(email);
});
</script>
</body>
</html>
