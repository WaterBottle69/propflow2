<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — PropFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../css/main.css"/>
</head>
<body>
<div class="auth-page">
  <div style="width:100%; max-width:420px;">

    <div style="text-align:center; margin-bottom:28px;">
      <a href="../index.html" class="auth-logo" style="display:inline-block; text-decoration:none;">PropFlow<span class="dot">.</span></a>
    </div>

    <div class="auth-card">
      <div class="auth-header">
        <h2>Welcome back</h2>
        <p>Sign in to your PropFlow dashboard</p>
      </div>
      <div class="auth-body">

        <div id="error-banner" style="display:none; padding:11px 14px; background:rgba(248,113,113,.1); border:1px solid rgba(248,113,113,.25); border-radius:var(--radius-sm); font-size:13px; color:var(--red); margin-bottom:16px;"></div>
        <div id="success-banner" style="display:none; padding:11px 14px; background:var(--accent-dim); border:1px solid rgba(74,222,128,.25); border-radius:var(--radius-sm); font-size:13px; color:var(--accent); margin-bottom:16px;"></div>

        <form id="login-form" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" placeholder="you@brokerage.com" autocomplete="email" required/>
            <div class="form-error" id="err-email">Enter a valid email</div>
          </div>

          <div class="form-group">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
              <label for="password" style="margin:0;">Password</label>
              <a href="forgot-password.html" style="font-size:12px; color:var(--text3);">Forgot password?</a>
            </div>
            <div class="input-icon-wrap">
              <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
              <button type="button" class="input-icon" style="cursor:pointer; pointer-events:all; background:none; border:none; right:12px; left:auto; color:var(--text3); font-size:14px;" onclick="togglePw()">👁</button>
            </div>
            <div class="form-error" id="err-password">Required</div>
          </div>

          <div style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
            <input type="checkbox" id="remember" style="width:auto; accent-color:var(--accent);"/>
            <label for="remember" style="font-size:13px; color:var(--text2); cursor:pointer; margin:0;">Keep me signed in</label>
          </div>

          <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">Sign in →</button>

          <!-- Demo mode bypass -->
          <div style="margin-top:12px;">
            <button type="button" class="btn btn-ghost btn-full" onclick="demoLogin()">
              🎭 &nbsp;Try demo (no account needed)
            </button>
          </div>
        </form>
      </div>
      <div class="auth-footer">
        New to PropFlow? <a href="signup.html">Create a free account</a>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../config.js"></script>
<script src="../js/supabase-client.js"></script>
<script src="../js/app.js"></script>
<script>
// Check for ?verified or ?reset params
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('verified')) {
    document.getElementById('success-banner').textContent = '✓ Email verified! You can now sign in.';
    document.getElementById('success-banner').style.display = 'block';
  }
  if (params.get('reset')) {
    document.getElementById('success-banner').textContent = '✓ Password updated. Sign in with your new password.';
    document.getElementById('success-banner').style.display = 'block';
  }
})();

function togglePw() {
  const inp = document.getElementById('password');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function demoLogin() {
  localStorage.setItem('propflow_demo_user', JSON.stringify({
    name: 'Jordan Mitchell', email: 'demo@propflow.ai', role: 'agent',
  }));
  const redirect = new URLSearchParams(window.location.search).get('redirect') || '../dashboard/index.html';
  window.location.href = redirect.startsWith('/') ? '..' + redirect : redirect;
}

document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();

  document.querySelectorAll('.form-error').forEach(el => el.classList.remove('visible'));
  document.getElementById('error-banner').style.display = 'none';

  const email = document.getElementById('email').value.trim();
  const pw    = document.getElementById('password').value;
  let ok = true;

  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { document.getElementById('err-email').classList.add('visible'); ok = false; }
  if (!pw) { document.getElementById('err-password').classList.add('visible'); ok = false; }
  if (!ok) return;

  const btn = document.getElementById('submit-btn');
  setLoading(btn, true);

  const sb = window.supabaseClient;
  if (!sb) { demoLogin(); return; }

  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  setLoading(btn, false, 'Sign in →');

  if (error) {
    document.getElementById('error-banner').textContent = error.message === 'Invalid login credentials'
      ? 'Email or password is incorrect. Try again or reset your password.'
      : error.message;
    document.getElementById('error-banner').style.display = 'block';
    return;
  }

  const redirect = new URLSearchParams(window.location.search).get('redirect') || '../dashboard/index.html';
  window.location.href = redirect;
});
</script>
</body>
</html>
